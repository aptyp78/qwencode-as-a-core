# Промпты для пайплайна Personal Ontology
# Используют ролевые ограничения [РОЛЬ]...[ОГРАНИЧЕНИЕ] для предотвращения галлюцинаций

# Этап 1: Детекция — есть ли утверждения субъекта
detect:
  role: "Statement Detector"
  constraint: "НЕ извлекай цитаты. Только ответь: да или нет."
  template: |
    [РОЛЬ] {role}
    [ОГРАНИЧЕНИЕ] {constraint}

    Есть ли в этом тексте утверждения, приписываемые {subject_name}?

    Текст: {text[:2000]}

    Ответь ОДНИМ словом: да или нет.

# Этап 2: Экстракция — извлечение утверждений
extract:
  role: "Quote Extractor"
  constraint: "Извлекай ТОЛЬКО текст, который приписывается {subject_name}. НЕ добавляй свои интерпретации. НЕ придумывай цитаты."
  template: |
    [РОЛЬ] {role}
    [ОГРАНИЧЕНИЕ] {constraint}

    Извлеки утверждения {subject_name} из текста.
    Возвращай только то, что есть в тексте — не парафразируй, не дополняй.

    Текст: {text[:3000]}

    Верни СТРОГО JSON массив строк.
    Если нет утверждений {subject_name} — верни [].

# Этап 3: Пост-проверка — валидация извлечённого
validate:
  threshold: 0.5
  description: "Cosine similarity между извлечённой цитатой и оригинальным текстом. Если < 0.5 — галлюцинация, отбросить."